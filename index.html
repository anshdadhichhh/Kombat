<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tekken Style JS Fighter</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #8fb6e8; }
      #boot { position: fixed; inset: 0; background: #101827; color: #fff; display: grid; place-items: center; font: 16px system-ui, Arial; z-index: 9999; }
      #playBtn { display:none; margin-top:16px; padding:12px 32px; border-radius:999px; border:2px solid white; background:#ffcc33; font-weight:900; font-size:20px; cursor:pointer; }
    </style>
  </head>
  <body>
    <div id="boot"><div style="text-align:center"><div id="bootMessage">Loading all assets...</div><button id="playBtn">PLAY</button></div></div>

    <div id="hud">
      <div class="barWrap"><span>P1</span><div class="bar"><div id="p1Health" class="fill"></div></div></div>
      <div id="roundText">ROUND 1</div>
      <div class="barWrap right"><span>AI RIGHT</span><div class="bar"><div id="p2Health" class="fill"></div></div></div>
    </div>

    <button id="replayBtn">Replay</button>

    <div id="arenaControls">
      <b>Arena Transform</b>
      <label>Model <select id="arenaSelect"><option value="arena1.glb">arena1.glb</option><option value="arena2.glb">arena2.glb</option></select><span></span></label>
      <label>Scale X <input id="arenaScaleX" type="range" min="0.01" max="100" step="0.05" value="1"><span id="arenaScaleXValue">1.00</span></label>
      <label>Scale Y <input id="arenaScaleY" type="range" min="0.01" max="100" step="0.05" value="1"><span id="arenaScaleYValue">1.00</span></label>
      <label>Scale Z <input id="arenaScaleZ" type="range" min="0.01" max="100" step="0.05" value="1"><span id="arenaScaleZValue">1.00</span></label>
      <label>Pos X <input id="arenaX" type="range" min="-1000" max="1000" step="1" value="0"><span id="arenaXValue">0.0</span></label>
      <label>Pos Y <input id="arenaY" type="range" min="-1000" max="1000" step="1" value="0"><span id="arenaYValue">0.0</span></label>
      <label>Pos Z <input id="arenaZ" type="range" min="-1000" max="1000" step="1" value="0"><span id="arenaZValue">0.0</span></label>
      <label>Rot X <input id="arenaRotX" type="range" min="-180" max="180" step="1" value="0"><span id="arenaRotXValue">0</span></label>
      <label>Rot Y <input id="arenaRotY" type="range" min="-180" max="180" step="1" value="0"><span id="arenaRotYValue">0</span></label>
      <label>Rot Z <input id="arenaRotZ" type="range" min="-180" max="180" step="1" value="0"><span id="arenaRotZValue">0</span></label>
      <hr />
      <b>P1 Transform</b>
      <label>Scale <input id="p1Scale" type="range" min="0.1" max="10" step="0.05" value="2.05"><span id="p1ScaleValue">2.05</span></label>
      <label>Pos X <input id="p1X" type="range" min="-100" max="100" step="0.1" value="-2.4"><span id="p1XValue">-2.4</span></label>
      <label>Pos Y <input id="p1Y" type="range" min="-50" max="50" step="0.1" value="0.5"><span id="p1YValue">0.5</span></label>
      <label>Pos Z <input id="p1Z" type="range" min="-100" max="100" step="0.1" value="0"><span id="p1ZValue">0.0</span></label>
      <label>Rot X <input id="p1RotX" type="range" min="-180" max="180" step="1" value="0"><span id="p1RotXValue">0</span></label>
      <label>Rot Y <input id="p1RotY" type="range" min="-180" max="180" step="1" value="0"><span id="p1RotYValue">0</span></label>
      <label>Rot Z <input id="p1RotZ" type="range" min="-180" max="180" step="1" value="0"><span id="p1RotZValue">0</span></label>
      <hr />
      <b>AI Right Transform</b>
      <label>Scale <input id="p2Scale" type="range" min="0.1" max="10" step="0.05" value="2.05"><span id="p2ScaleValue">2.05</span></label>
      <label>Pos X <input id="p2X" type="range" min="-100" max="100" step="0.1" value="2.4"><span id="p2XValue">2.4</span></label>
      <label>Pos Y <input id="p2Y" type="range" min="-50" max="50" step="0.1" value="0.5"><span id="p2YValue">0.5</span></label>
      <label>Pos Z <input id="p2Z" type="range" min="-100" max="100" step="0.1" value="0"><span id="p2ZValue">0.0</span></label>
      <label>Rot X <input id="p2RotX" type="range" min="-180" max="180" step="1" value="0"><span id="p2RotXValue">0</span></label>
      <label>Rot Y <input id="p2RotY" type="range" min="-180" max="180" step="1" value="0"><span id="p2RotYValue">0</span></label>
      <label>Rot Z <input id="p2RotZ" type="range" min="-180" max="180" step="1" value="0"><span id="p2RotZValue">0</span></label>
    </div>

    <div id="help">
      <b>P1:</b> A/D move, W jump, S block/crouch, Q or Z punch, E or C kick, X heavy<br/>
      <b>AI:</b> right-side opponent · no body push/collision separation
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
