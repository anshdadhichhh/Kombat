<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tekken Style JS Fighter</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #101827; }
      #boot { position: fixed; inset: 0; background: #101827; color: #fff; display: grid; place-items: center; font: 16px system-ui, Arial; z-index: 9999; }
      #playBtn { display:none; margin-top:16px; padding:12px 32px; border-radius:999px; border:2px solid white; background:#ffcc33; font-weight:900; font-size:20px; cursor:pointer; }
    </style>
  </head>
  <body>
    <div id="boot"><div style="text-align:center"><div id="bootMessage">Loading arena and fighters...</div><button id="playBtn">PLAY</button></div></div>

    <div id="hud">
      <div class="barWrap"><span>P1 LEFT</span><div class="bar"><div id="p1Health" class="fill"></div></div></div>
      <div id="roundText">ROUND 1</div>
      <div class="barWrap right"><span>AI RIGHT</span><div class="bar"><div id="p2Health" class="fill"></div></div></div>
    </div>

    <button id="replayBtn">Replay</button>

    <div id="arenaControls">
      <b>Arena GLB Transform</b>
      <div class="buttonRow">
        <button id="gizmoTranslate">Move</button>
        <button id="gizmoRotate">Rotate</button>
        <button id="gizmoScale">Scale</button>
      </div>
      <label>Orbit <input id="orbitMode" type="checkbox"><span>cam</span></label>
      <div class="buttonRow"><button id="resetCamera" type="button">Reset Camera</button></div>
      <label>Scale <input id="arenaScale" type="range" min="0.001" max="100" step="0.001" value="1"><span id="arenaScaleValue">1.000</span></label>
      <label>Pos X <input id="arenaX" type="range" min="-1000" max="1000" step="0.01" value="0"><span id="arenaXValue">0.00</span></label>
      <label>Pos Y <input id="arenaY" type="range" min="-1000" max="1000" step="0.01" value="0"><span id="arenaYValue">0.00</span></label>
      <label>Pos Z <input id="arenaZ" type="range" min="-1000" max="1000" step="0.01" value="0"><span id="arenaZValue">0.00</span></label>
      <label>Rot X <input id="arenaRotX" type="range" min="-180" max="180" step="0.1" value="0"><span id="arenaRotXValue">0.0</span></label>
      <label>Rot Y <input id="arenaRotY" type="range" min="-180" max="180" step="0.1" value="0"><span id="arenaRotYValue">0.0</span></label>
      <label>Rot Z <input id="arenaRotZ" type="range" min="-180" max="180" step="0.1" value="0"><span id="arenaRotZValue">0.0</span></label>
      <hr />
      <b>Export Arena Config</b>
      <div class="buttonRow">
        <button id="exportArenaConfig" type="button">Show</button>
        <button id="copyArenaConfig" type="button">Copy</button>
      </div>
      <div class="buttonRow">
        <button id="saveArenaConfig" type="button">Save Local</button>
        <button id="loadArenaConfig" type="button">Load Local</button>
        <button id="applyArenaConfig" type="button">Apply Text</button>
      </div>
      <textarea id="arenaConfigOutput" rows="8" placeholder="Click Show/Copy after placing the arena, then send me this JSON."></textarea>
      <hr />
      <b>Background Image</b>
      <input id="backgroundImage" type="file" accept="image/*" />
      <label>Path <input id="backgroundPath" type="text" value="/assets/arena/background.jpg"><button id="loadBackgroundPath" type="button">Load</button></label>
    </div>

    <div id="help">
      <b>P1 LEFT:</b> A/D move, W jump, S block/crouch, Q or Z punch, E or C kick, X heavy<br/>
      <b>Arena controls:</b> click Show/Copy after placing arena and send me the JSON.
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
