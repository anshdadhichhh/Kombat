<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tekken Style JS Fighter</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #05060a; }
      #boot { position: fixed; inset: 0; background: #05060a; color: #fff; display: grid; place-items: center; font: 16px system-ui, Arial; z-index: 9999; }
    </style>
  </head>
  <body>
    <div id="boot">Loading game...</div>
    <div id="hud">
      <div class="barWrap"><span>P1</span><div class="bar"><div id="p1Health" class="fill"></div></div></div>
      <div id="roundText">ROUND 1</div>
      <div class="barWrap right"><span>AI</span><div class="bar"><div id="p2Health" class="fill"></div></div></div>
    </div>
    <div id="help">
      <b>P1:</b> A/D move, W jump, S crouch/block, J punch, K kick, L heavy<br/>
      <b>AI:</b> automatic opponent
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
