<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tekken Style JS Fighter</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #8fb6e8; }
      #boot { position: fixed; inset: 0; background: #101827; color: #fff; display: grid; place-items: center; font: 16px system-ui, Arial; z-index: 9999; }
      #playBtn { display:none; margin-top:16px; padding:12px 32px; border-radius:999px; border:2px solid white; background:#ffcc33; font-weight:900; font-size:20px; cursor:pointer; }
    </style>
  </head>
  <body>
    <div id="boot"><div style="text-align:center"><div id="bootMessage">Loading all assets...</div><button id="playBtn">PLAY</button></div></div>

    <div id="hud">
      <div class="barWrap"><span>P1</span><div class="bar"><div id="p1Health" class="fill"></div></div></div>
      <div id="roundText">ROUND 1</div>
      <div class="barWrap right"><span>AI</span><div class="bar"><div id="p2Health" class="fill"></div></div></div>
    </div>

    <button id="replayBtn">Replay</button>

    <div id="arenaControls">
      <b>Arena</b>
      <label>Model
        <select id="arenaSelect">
          <option value="arena1.glb">arena1.glb</option>
          <option value="arena2.glb">arena2.glb</option>
        </select>
        <span></span>
      </label>
      <label>Size <input id="arenaScale" type="range" min="0.01" max="100" step="0.05" value="1"><span id="arenaScaleValue">1.00</span></label>
      <label>Offset X <input id="arenaX" type="range" min="-1000" max="1000" step="1" value="0"><span id="arenaXValue">0.0</span></label>
      <label>Offset Y <input id="arenaY" type="range" min="-1000" max="1000" step="1" value="0"><span id="arenaYValue">0.0</span></label>
      <label>Offset Z <input id="arenaZ" type="range" min="-1000" max="1000" step="1" value="0"><span id="arenaZValue">0.0</span></label>
    </div>

    <div id="help">
      <b>P1:</b> A/D move, W jump, S block/crouch, Q or Z punch, E or C kick, X heavy<br/>
      <b>AI:</b> automatic opponent · fighters can cross/pass each other
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
