<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tekken Style JS Fighter</title>
  </head>
  <body>
    <div id="hud">
      <div class="barWrap"><span>P1</span><div class="bar"><div id="p1Health" class="fill"></div></div></div>
      <div id="roundText">ROUND 1</div>
      <div class="barWrap right"><span>P2</span><div class="bar"><div id="p2Health" class="fill"></div></div></div>
    </div>
    <div id="help">
      <b>P1:</b> A/D move, W jump, S crouch/block, J punch, K kick, L heavy<br/>
      <b>P2:</b> ←/→ move, ↑ jump, ↓ crouch/block, Num1 punch, Num2 kick, Num3 heavy
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
