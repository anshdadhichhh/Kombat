<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tekken Style JS Fighter</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #101827; }
      #boot { position: fixed; inset: 0; background: #101827; color: #fff; display: grid; place-items: center; font: 16px system-ui, Arial; z-index: 9999; }
      #playBtn { display:none; margin-top:16px; padding:12px 32px; border-radius:999px; border:2px solid white; background:#ffcc33; font-weight:900; font-size:20px; cursor:pointer; }
    </style>
  </head>
  <body>
    <div id="boot"><div style="text-align:center"><div id="bootMessage">Building arena and loading fighters...</div><button id="playBtn">PLAY</button></div></div>

    <div id="hud">
      <div class="barWrap"><span>AI LEFT</span><div class="bar"><div id="p2Health" class="fill"></div></div></div>
      <div id="roundText">ROUND 1</div>
      <div class="barWrap right"><span>P1 RIGHT</span><div class="bar"><div id="p1Health" class="fill"></div></div></div>
    </div>

    <button id="replayBtn">Replay</button>

    <div id="help">
      <b>P1 RIGHT:</b> A/D move, W jump, S block/crouch, Q or Z punch, E or C kick, X heavy<br/>
      <b>AI LEFT:</b> automatic opponent · no collision separation · procedural arena
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
